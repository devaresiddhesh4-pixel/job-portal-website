<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:500px;
    max-width:90%;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#0077cc;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#28a745;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

#successMessage{
    margin-top:15px;
    text-align:center;
    color:green;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

    <h1>Job Application Form</h1>

    <form id="jobForm">

        <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
        >

        <input
            type="tel"
            id="phone"
            placeholder="Mobile Number"
            required
        >

        <input
            type="text"
            id="qualification"
            placeholder="Qualification"
            required
        >

        <input
            type="text"
            id="skills"
            placeholder="Skills"
            required
        >

        <select id="experience" required>
            <option value="">Select Experience</option>
            <option>Fresher</option>
            <option>1 Year</option>
            <option>2 Years</option>
            <option>3+ Years</option>
        </select>

        <textarea
            id="about"
            rows="5"
            placeholder="Tell us about yourself"
            required
        ></textarea>

        <button type="submit">
            Submit Application
        </button>

    </form>

    <p id="successMessage"></p>

</div>

<script>

document
.getElementById("jobForm")
.addEventListener("submit", function(event){

    event.preventDefault();

    document.getElementById("successMessage").innerText =
    "Application Submitted Successfully!";

    this.reset();

});

</script>

</body>
</html>
